name: Build
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job(s) to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - skia
          - cairo
          - quartz2d
          - linux-hosts
env:
  BUILD_TYPE: Release
jobs:

  ###########################################################################
  # Linux Hosts — build all 6 configs + headless smoke test
  # (gtk3 | wayland | x11) × (cairo | skia)
  #
  # This job ensures the native Linux host files always compile and the
  # examples start without crashing. It would have caught both PR #27
  # compile errors (NativeSurface typo, missing <iostream>) and the
  # immediate segfault caused by a null zxdg_decoration_manager_v1 pointer.
  ###########################################################################
  build-linux-hosts:
    name: "Linux Hosts (${{ matrix.host }}/${{ matrix.backend }})"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'linux-hosts'
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;http,https://media.cycfi.com/vcpkg-cache/{sha}.zip,read;x-aws,s3://cycfi-media/vcpkg-cache/,write"
      AWS_ENDPOINT_URL: "https://24c350f8d000d722e6bcc12e3b03469a.r2.cloudflarestorage.com"
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    strategy:
      fail-fast: false
      matrix:
        host:    [gtk3, wayland, x11]
        backend: [cairo, skia]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install base dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build pkg-config xvfb

    - name: Install cairo backend dependencies
      if: matrix.backend == 'cairo'
      run: |
        sudo apt-get install -y \
          libcairo2-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev

    - name: Install skia backend dependencies
      if: matrix.backend == 'skia'
      run: |
        sudo apt-get install -y \
          libharfbuzz-dev libunibreak-dev libfontconfig1-dev \
          libgl1-mesa-dev libglu1-mesa-dev \
          autoconf autoconf-archive automake libtool

    - name: Install gtk3 host dependencies
      if: matrix.host == 'gtk3'
      run: |
        sudo apt-get install -y libgtk-3-dev libgtkglext1-dev libegl-dev

    - name: Install wayland host dependencies
      if: matrix.host == 'wayland'
      run: |
        sudo apt-get install -y \
          libwayland-dev wayland-protocols \
          libdecor-0-dev libxkbcommon-dev \
          libegl-dev libgl1-mesa-dev \
          weston

    - name: Install x11 host dependencies
      if: matrix.host == 'x11'
      run: |
        sudo apt-get install -y libx11-dev libegl-dev libgl1-mesa-dev

    - name: Bootstrap vcpkg (skia)
      if: matrix.backend == 'skia'
      run: lib/external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Configure
      run: |
        if [ "${{ matrix.backend }}" = "skia" ]; then
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build-hosts \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DARTIST_SKIA=ON \
            -DARTIST_BUILD_EXAMPLES=ON \
            -DARTIST_BUILD_TESTS=OFF \
            -DARTIST_LINUX_HOST=${{ matrix.host }} \
            -DCMAKE_TOOLCHAIN_FILE=lib/external/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DVCPKG_ENV_PASSTHROUGH_UNTRACKED=PKG_CONFIG_PATH \
            -G Ninja
        else
          cmake -S . -B build-hosts \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DARTIST_CAIRO=ON \
            -DARTIST_BUILD_EXAMPLES=ON \
            -DARTIST_BUILD_TESTS=OFF \
            -DARTIST_LINUX_HOST=${{ matrix.host }} \
            -G Ninja
        fi

    - name: Build
      run: cmake --build build-hosts

    - name: Smoke test — GTK3 and X11 hosts (Xvfb)
      if: matrix.host != 'wayland'
      run: |
        # Run each example for up to 3 seconds under a virtual framebuffer.
        # Exit 0 = clean shutdown, 124 = killed by timeout (both are success).
        # Any crash (SIGSEGV → 139, SIGABRT → 134, etc.) fails the job.
        # Use || to prevent set -e from firing on timeout's 124 exit code.
        for bin in $(find build-hosts/examples -maxdepth 1 -type f -executable); do
          echo "--- smoke: $bin"
          xvfb-run --auto-servernum -- timeout 3 "$bin" \
            || { code=$?; [ $code -eq 124 ] || exit $code; }
        done

    - name: Smoke test — Wayland host (weston headless)
      if: matrix.host == 'wayland'
      run: |
        # Spin up a headless weston compositor, point examples at its socket.
        export XDG_RUNTIME_DIR=/tmp/ci-xdg
        mkdir -p "$XDG_RUNTIME_DIR"
        weston --backend=headless-backend.so --socket=ci-wayland \
               --no-config --idle-time=0 &
        WESTON_PID=$!
        # Give weston a moment to bind the socket before clients connect.
        sleep 1
        export WAYLAND_DISPLAY=ci-wayland
        FAILED=0
        for bin in $(find build-hosts/examples -maxdepth 1 -type f -executable); do
          echo "--- smoke: $bin"
          timeout 3 "$bin" \
            || { code=$?; [ $code -eq 124 ] || FAILED=$code; }
        done
        kill "$WESTON_PID" 2>/dev/null || true
        exit $FAILED

  ###########################################################################
  # Skia
  ###########################################################################
  build-skia:
    name: "Skia (${{ matrix.config.name }})"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'skia'
    runs-on: ${{ matrix.config.os }}
    permissions:
      packages: write
      contents: read
    env:
      # vcpkg binary cache, keyed by package ABI hash (compiler + portfile +
      # triplet). Three layers, in read priority:
      #   1. http  -> public anonymous read from Cloudflare R2 (media.cycfi.com);
      #              lets a fresh clone / fork restore with no auth.
      #   2. x-aws -> CI-only authenticated write of new archives to the same R2
      #              bucket via the S3 API (AWS CLI redirected by AWS_ENDPOINT_URL).
      # A cold build (cache miss) is uploaded once via x-aws; thereafter every
      # run, fork, and clone restores anonymously over http (shared with
      # cycfi/elements). (NuGet and the removed x-gha backend are no longer used.)
      VCPKG_BINARY_SOURCES: "clear;http,https://media.cycfi.com/vcpkg-cache/{sha}.zip,read;x-aws,s3://cycfi-media/vcpkg-cache/,write"
      # R2 (S3-compatible) credentials for the x-aws write layer. Withheld from
      # fork PR runs by GitHub; x-aws write then no-ops and http read still works.
      AWS_ENDPOINT_URL: "https://24c350f8d000d722e6bcc12e3b03469a.r2.cloudflarestorage.com"
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    strategy:
      fail-fast: false
      matrix:
        config:
        # --- x86-64 ---
        - name: "Windows MSVC x64"
          os: windows-latest
          cc: cl
          cxx: cl
          triplet: x64-windows
          environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
        - name: "Ubuntu GCC x64"
          os: ubuntu-latest
          cc: gcc
          cxx: g++
          triplet: x64-linux
          pkg_config_path: "/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        # --- arm64 ---
        # NOTE: macOS Intel (x64-osx) and windows-11-arm/arm64-windows are
        # deferred (see cycfi_ai_dev TODO) — Intel-mac needs a billable larger
        # runner, and arm64-windows needs a vswhere vcvars fix.
        # NOTE: arm64-linux (ubuntu-24.04-arm) is deferred for artist — the
        # build + R2 restore work, but one rendering-tolerance test needs an
        # arm64-linux golden established first (see cycfi_ai_dev TODO). The
        # arm64-linux Skia ABI is still cached (cycfi/elements seeds it).
        - name: "macOS Clang arm64"
          os: macos-latest
          cc: clang
          cxx: clang++
          triplet: arm64-osx
          pkg_config_path: "/opt/homebrew/lib/pkgconfig"
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libharfbuzz-dev \
          libunibreak-dev \
          fontconfig \
          libgtkglext1-dev \
          libgtk-3-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          ninja-build \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          xvfb

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install fontconfig ninja coreutils

    - name: Bootstrap vcpkg (macOS)
      if: runner.os == 'macOS'
      run: lib/external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Bootstrap vcpkg (Linux)
      if: runner.os == 'Linux'
      run: lib/external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja
      shell: cmd

    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      run: lib\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      shell: cmd

    - name: Configure
      shell: cmake -P {0}
      run: |
        set(ENV{CC} ${{ matrix.config.cc }})
        set(ENV{CXX} ${{ matrix.config.cxx }})

        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt
          )
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        # Triplet pinned per matrix entry (the runner arch must match or vcpkg
        # builds libraries for the wrong arch).
        set(extra_args
          -DCMAKE_TOOLCHAIN_FILE=lib/external/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }})
        if (NOT "${{ runner.os }}" STREQUAL "Windows")
          # vcpkg sanitizes the environment; expose the platform pkg-config dir
          # so the skia port's build + system GL/fontconfig/harfbuzz resolve
          # (Homebrew on macOS, system multiarch dir on Linux).
          set(ENV{PKG_CONFIG_PATH} "${{ matrix.config.pkg_config_path }}:$ENV{PKG_CONFIG_PATH}")
          list(APPEND extra_args
            -DVCPKG_ENV_PASSTHROUGH_UNTRACKED=PKG_CONFIG_PATH)
        endif()

        execute_process(
          COMMAND ${CMAKE_COMMAND}
            -S .
            -B build
            -D CMAKE_BUILD_TYPE=$ENV{BUILD_TYPE}
            -D ARTIST_SKIA=ON
            -D ARTIST_BUILD_EXAMPLES=ON
            -D ARTIST_BUILD_TESTS=ON
            -G Ninja
            -D CMAKE_MAKE_PROGRAM=ninja
            ${extra_args}
          RESULT_VARIABLE result
          ERROR_VARIABLE error_message
        )
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Configure failed: ${error_message} - ${result}")
        endif()

    - name: Build
      shell: cmake -P {0}
      run: |
        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt
          )
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        execute_process(
          COMMAND ${CMAKE_COMMAND} --build build
          RESULT_VARIABLE result
          ERROR_VARIABLE error_message
        )
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Build failed: ${error_message} - ${result}")
        endif()

    - name: Test
      run: ctest --verbose --test-dir build
      shell: bash

    - name: Smoke test examples
      shell: bash
      run: |
        # Run each example for 3 seconds. Exit 0 = clean, 124 = killed by timeout — both pass.
        # A crash (SIGSEGV → 139, abort → 134, etc.) is a non-zero, non-124 code and fails.
        # Use || to prevent set -e from firing on timeout's 124 exit code.
        # macOS ships gtimeout from brew coreutils; Linux/Windows use timeout.
        TOUT=$(command -v gtimeout 2>/dev/null || echo timeout)
        if [ "$RUNNER_OS" = "Linux" ]; then
          for bin in $(find build/examples -maxdepth 1 -type f -executable 2>/dev/null); do
            echo "--- smoke: $bin"
            xvfb-run --auto-servernum -- $TOUT 3 "$bin" \
              || { code=$?; [ $code -eq 124 ] || exit $code; }
          done
        elif [ "$RUNNER_OS" = "macOS" ]; then
          for app in build/examples/*.app; do
            bin="$app/Contents/MacOS/$(basename "${app%.app}")"
            echo "--- smoke: $bin"
            $TOUT 3 "$bin" \
              || { code=$?; [ $code -eq 124 ] || exit $code; }
          done
        else
          for exe in $(find build/examples -maxdepth 2 -name "*.exe" 2>/dev/null); do
            echo "--- smoke: $exe"
            $TOUT 3 "$exe" \
              || { code=$?; [ $code -eq 124 ] || exit $code; }
          done
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-skia-${{ matrix.config.name }}
        path: build/test/results/
        if-no-files-found: ignore

  ###########################################################################
  # Cairo
  ###########################################################################
  build-cairo:
    name: "Cairo (${{ matrix.config.name }})"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'cairo'
    runs-on: ${{ matrix.config.os }}
    env:
      # Cairo uses vcpkg only on Windows (Unix uses system cairo); its dep tree
      # (glib/gettext/pixman/fontconfig/freetype…) is slow to cold-build, so
      # cache it on the ABI-exact R2 vcpkg cache. No-op on the Unix cairo jobs
      # (they never invoke vcpkg).
      VCPKG_BINARY_SOURCES: "clear;http,https://media.cycfi.com/vcpkg-cache/{sha}.zip,read;x-aws,s3://cycfi-media/vcpkg-cache/,write"
      AWS_ENDPOINT_URL: "https://24c350f8d000d722e6bcc12e3b03469a.r2.cloudflarestorage.com"
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: "Windows MSVC"
          os: windows-latest
          cc: cl
          cxx: cl
          environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
        - name: "macOS Clang"
          os: macos-latest
          cc: clang
          cxx: clang++
        - name: "Ubuntu GCC"
          os: ubuntu-latest
          cc: gcc
          cxx: g++
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libgtk-3-dev \
          pkg-config \
          ninja-build \
          xvfb

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cairo fontconfig freetype harfbuzz ninja coreutils

    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      run: lib\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      shell: cmd

    - name: Configure
      shell: cmake -P {0}
      run: |
        set(ENV{CC} ${{ matrix.config.cc }})
        set(ENV{CXX} ${{ matrix.config.cxx }})

        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt
          )
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        set(extra_args)
        if ("${{ runner.os }}" STREQUAL "Windows")
          list(APPEND extra_args
            -DCMAKE_TOOLCHAIN_FILE=lib/external/vcpkg/scripts/buildsystems/vcpkg.cmake)
        endif()

        execute_process(
          COMMAND ${CMAKE_COMMAND}
            -S .
            -B build-cairo
            -D CMAKE_BUILD_TYPE=$ENV{BUILD_TYPE}
            -D ARTIST_CAIRO=ON
            -D ARTIST_BUILD_EXAMPLES=ON
            -D ARTIST_BUILD_TESTS=ON
            -G Ninja
            -D CMAKE_MAKE_PROGRAM=ninja
            ${extra_args}
          RESULT_VARIABLE result
          ERROR_VARIABLE error_message
        )
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Configure failed: ${error_message} - ${result}")
        endif()

    - name: Build
      shell: cmake -P {0}
      run: |
        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt
          )
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        execute_process(
          COMMAND ${CMAKE_COMMAND} --build build-cairo
          RESULT_VARIABLE result
          ERROR_VARIABLE error_message
        )
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Build failed: ${error_message} - ${result}")
        endif()

    - name: Test
      run: ctest --verbose --test-dir build-cairo
      shell: bash

    - name: Smoke test examples
      shell: bash
      run: |
        TOUT=$(command -v gtimeout 2>/dev/null || echo timeout)
        if [ "$RUNNER_OS" = "Linux" ]; then
          for bin in $(find build-cairo/examples -maxdepth 1 -type f -executable 2>/dev/null); do
            echo "--- smoke: $bin"
            xvfb-run --auto-servernum -- $TOUT 3 "$bin" \
              || { code=$?; [ $code -eq 124 ] || exit $code; }
          done
        elif [ "$RUNNER_OS" = "macOS" ]; then
          for app in build-cairo/examples/*.app; do
            bin="$app/Contents/MacOS/$(basename "${app%.app}")"
            echo "--- smoke: $bin"
            $TOUT 3 "$bin" \
              || { code=$?; [ $code -eq 124 ] || exit $code; }
          done
        else
          for exe in $(find build-cairo/examples -maxdepth 2 -name "*.exe" 2>/dev/null); do
            echo "--- smoke: $exe"
            $TOUT 3 "$exe" \
              || { code=$?; [ $code -eq 124 ] || exit $code; }
          done
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-cairo-${{ matrix.config.name }}
        path: build-cairo/test/results/
        if-no-files-found: ignore

  ###########################################################################
  # Quartz2D
  ###########################################################################
  build-quartz2d:
    name: "Quartz2D (macOS Clang)"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'quartz2d'
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: brew install ninja coreutils

    - name: Configure
      run: |
        cmake -S . -B build-quartz2d \
          -DARTIST_QUARTZ_2D=ON \
          -DARTIST_BUILD_EXAMPLES=ON \
          -DARTIST_BUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -G Ninja

    - name: Build
      run: cmake --build build-quartz2d

    - name: Test
      run: ctest --verbose --test-dir build-quartz2d

    - name: Smoke test examples
      shell: bash
      run: |
        TOUT=$(command -v gtimeout 2>/dev/null || echo timeout)
        for app in build-quartz2d/examples/*.app; do
          bin="$app/Contents/MacOS/$(basename "${app%.app}")"
          echo "--- smoke: $bin"
          $TOUT 3 "$bin" \
            || { code=$?; [ $code -eq 124 ] || exit $code; }
        done

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-quartz2d
        path: build-quartz2d/test/results/
        if-no-files-found: ignore
